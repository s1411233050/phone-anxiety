<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>被「點亮」的焦慮 | 深度測評</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #eef2ff; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-next { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: all 0.3s; }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .sort-item { cursor: grab; transition: transform 0.2s, background-color 0.2s; border: 2px solid transparent; }
        .sort-item:active { cursor: grabbing; }
        .ghost { opacity: 0.5; background: #c7d2fe !important; border: 2px dashed #6366f1 !important; }
        .step-hidden { display: none; }
        input[type=range] { accent-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl">
        <!-- Start Screen -->
        <div id="step-start" class="glass-card p-10 text-center animate__animated animate__fadeIn">
            <div class="mb-6 inline-block p-4 bg-indigo-100 rounded-full text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 002 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-4">被「點亮」的焦慮測評</h1>
            <p class="text-gray-600 mb-8 leading-relaxed text-sm sm:text-base">
                本測評分為兩階段：<br>
                1. <b>隨機抽樣排序</b> (共 3 輪)：針對具體行為感官排序。<br>
                2. <b>層次深度評估</b> (最終輪)：針對核心心理層面評分。
            </p>
            <button onclick="startSurvey()" class="btn-next text-white px-12 py-4 rounded-full font-bold text-lg shadow-xl">
                開始深度測試
            </button>
        </div>

        <!-- Sorting Phase (Rounds 1-3) -->
        <div id="step-sorting" class="glass-card p-8 step-hidden">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 id="round-title" class="text-2xl font-bold text-indigo-900">第一輪排序</h2>
                    <p class="text-gray-500 text-sm mt-1">請依據這些狀況對你的「困擾程度」排序 (越嚴重越上方)</p>
                </div>
                <div id="round-count" class="text-indigo-500 font-bold italic text-lg">1/4</div>
            </div>
            
            <ul id="sortable-questions" class="space-y-3 mb-8">
                <!-- 動態注入隨機題目 -->
            </ul>

            <button onclick="nextRound()" class="w-full btn-next text-white py-4 rounded-2xl font-bold text-lg">
                確認，進入下一輪
            </button>
        </div>

        <!-- Assessment Phase (Round 4) -->
        <div id="step-assessment" class="glass-card p-8 step-hidden">
            <h2 class="text-2xl font-bold text-indigo-900 mb-2">最終層次評估</h2>
            <p class="text-gray-500 text-sm mb-6">這一次，請針對「大層面」進行排序並給出影響分數</p>
            
            <div id="layer-assessment-container" class="space-y-6">
                <!-- 動態注入層面排序與滑桿 -->
            </div>

            <button onclick="submitFinal()" class="w-full mt-10 btn-next text-white py-4 rounded-2xl font-bold text-lg shadow-lg">
                生成分析結果
            </button>
        </div>

        <!-- Result Screen -->
        <div id="step-result" class="glass-card p-10 step-hidden animate__animated animate__zoomIn">
            <h2 class="text-center text-2xl font-bold text-indigo-900 mb-6">你的心理防線分析報告</h2>
            <div id="analysis-output" class="space-y-4 text-gray-700 leading-relaxed"></div>
            <button onclick="location.reload()" class="w-full mt-8 bg-gray-100 text-gray-500 py-3 rounded-xl hover:bg-gray-200">重新測試</button>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzV4ZK6NyqUUQrAAhSl2HPxHWRqorWy0deD3EqdvmvXjFy-ONV8Bwl0BG-xPL-HhS5pw/exec';

        const surveyData = {
            'A': { title: '情緒層面', questions: ['當我一段時間沒看手機，會擔心錯過訊息。', '看到螢幕點亮或聽到提示音，會感到莫名的緊張。', '感到生活壓力大時，習慣滑手機來逃避。', '手機沒電或沒網路時，會感到強烈焦慮。', '長時間滑手機後，反而覺得更空虛。'] },
            'B': { title: '自我控制', questions: ['原本只想看一下，結果一滑就半小時。', '明知沒新通知，仍會下意識解鎖手機。', '在工作或學習時，很難維持 20 分鐘不看手機。', '即使很累，還是會強迫自己繼續滑手機。', '嘗試限制玩手機時間，但通常幾天就失敗。'] },
            'C': { title: '日常生活', questions: ['通勤或排隊空檔，完全無法忍受什麼都不做。', '為了玩手機，常常拖延原本該做的事。', '習慣一邊吃飯一邊滑手機，難以專注。', '過度使用手機已實質影響學業或工作效率。', '曾在走路或上下樓梯時，因看手機而差點危險。'] },
            'D': { title: '依賴性', questions: ['無論去哪裡，都必須把手機帶在身邊才安心。', '每天醒來第一件事和睡前最後一件事都是手機。', '需要花比以前更長的時間在手機上才能滿足。', '比起實體社交，更傾向在手機上獲得樂趣。', '覺得手機已成為身體一部分，失去它像失去控制。'] },
            'E': { title: '社會影響', questions: ['聚餐時常因為看手機忽略了眼前的陪伴。', '更習慣透過文字或貼圖表達情感，而非面談。', '看到社群上別人的生活會感到自卑或平庸。', '身邊親友曾抱怨過我花太多時間在手機上。', '維護數位人設的心力，已超越經營現實關係。'] }
        };

        let currentRound = 1;
        let roundResults = []; // 存儲前三輪排序
        let finalAssessment = { ranking: [], scores: {} };
        let sortableInstance;

        function startSurvey() {
            showStep('step-start', 'step-sorting');
            renderSortingRound();
        }

        // 渲染前三輪：隨機抽題排序
        function renderSortingRound() {
            document.getElementById('round-title').innerText = `第 ${currentRound} 輪隨機排序`;
            document.getElementById('round-count').innerText = `${currentRound}/4`;
            
            const container = document.getElementById('sortable-questions');
            container.innerHTML = '';

            // 每個層次隨機抽一題
            const roundQuestions = Object.keys(surveyData).map(id => {
                const questions = surveyData[id].questions;
                const randomIdx = Math.floor(Math.random() * questions.length);
                return { id, text: questions[randomIdx] };
            });

            // 隨機打亂初始順序 (讓使用者自己排)
            roundQuestions.sort(() => Math.random() - 0.5);

            roundQuestions.forEach(item => {
                const li = document.createElement('li');
                li.dataset.id = item.id;
                li.className = 'sort-item bg-white p-4 rounded-xl shadow-sm border-2 border-indigo-50 flex items-center gap-3 animate__animated animate__fadeInUp';
                li.innerHTML = `
                    <div class="flex-shrink-0 w-8 h-8 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold text-xs">?</div>
                    <p class="flex-1 text-gray-700 text-sm font-medium">${item.text}</p>
                    <span class="text-gray-300">☰</span>
                `;
                container.appendChild(li);
            });

            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(container, { animation: 200, ghostClass: 'ghost' });
        }

        function nextRound() {
            const order = sortableInstance.toArray();
            roundResults.push(order);

            if (currentRound < 3) {
                currentRound++;
                renderSortingRound();
            } else {
                currentRound++;
                showStep('step-sorting', 'step-assessment');
                renderFinalAssessment();
            }
        }

        // 渲染第四輪：大層次排序與評分
        function renderFinalAssessment() {
            const container = document.getElementById('layer-assessment-container');
            container.innerHTML = '';
            
            // 預設排序為 A-E
            const layers = Object.keys(surveyData);
            
            layers.forEach(id => {
                const div = document.createElement('div');
                div.dataset.id = id;
                div.className = 'sort-item-final bg-white p-5 rounded-2xl border-2 border-indigo-100 shadow-sm';
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <span class="font-bold text-indigo-700">【${surveyData[id].title}】</span>
                        <span class="text-gray-300 drag-handle cursor-grab">☰ 拖曳排序</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs text-gray-400 font-bold">
                            <span>影響極輕微</span>
                            <span>影響極嚴重</span>
                        </div>
                        <input type="range" min="1" max="5" value="3" class="w-full score-slider" data-id="${id}">
                        <div class="text-center text-indigo-600 font-bold">當前評分：<span class="score-val">3</span> 分</div>
                    </div>
                `;
                container.appendChild(div);
            });

            // 綁定滑桿顯示
            container.querySelectorAll('.score-slider').forEach(s => {
                s.oninput = (e) => e.target.nextElementSibling.querySelector('.score-val').innerText = e.target.value;
            });

            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(container, { 
                animation: 200, 
                handle: '.drag-handle',
                ghostClass: 'ghost' 
            });
        }

        async function submitFinal() {
            const ranking = sortableInstance.toArray();
            const scores = {};
            document.querySelectorAll('.score-slider').forEach(s => {
                scores[s.dataset.id] = s.value;
            });

            finalAssessment = { ranking, scores };
            
            // 顯示 Loading
            document.getElementById('step-assessment').innerHTML = `<div class="text-center py-20 animate-pulse text-indigo-600 font-bold">大數據分析中...</div>`;
            
            await sendToGoogle();
            showResult();
        }

        async function sendToGoogle() {
            const payload = {
                r1: roundResults[0].join(','),
                r2: roundResults[1].join(','),
                r3: roundResults[2].join(','),
                finalRanking: finalAssessment.ranking.join(','),
                scores: finalAssessment.scores
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
            } catch(e) { console.error(e); }
        }

        function showResult() {
            showStep('step-assessment', 'step-result');
            const topLayerId = finalAssessment.ranking[0];
            const topScore = finalAssessment.scores[topLayerId];
            
            let html = `
                <div class="p-5 bg-indigo-50 rounded-2xl border-l-8 border-indigo-500 mb-6">
                    <p class="text-sm text-indigo-800 uppercase tracking-widest font-bold mb-1">核心影響層面</p>
                    <h3 class="text-3xl font-black text-indigo-900">${surveyData[topLayerId].title}</h3>
                </div>
                <p class="text-gray-600">在經過三輪隨機情境測試與最終自我評估中，你在<b>「${surveyData[topLayerId].title}」</b>表現出最強烈的連結（自評分數：${topScore}分）。</p>
            `;

            if (topLayerId === 'D' || topLayerId === 'B') {
                html += `<div class="p-4 bg-red-50 text-red-700 rounded-xl text-sm font-medium">⚠️ 深度分析：你的焦慮來源於對「控制權」的喪失。當手機不在身邊，大腦會進入戒斷警報，這並非單純的愛玩，而是神經路徑的依賴。</div>`;
            } else {
                html += `<div class="p-4 bg-blue-50 text-blue-700 rounded-xl text-sm font-medium">💡 深度分析：手機對你而言更像是一個「情緒避難所」。你習慣透過滑動螢幕來稀釋現實生活的壓力感。</div>`;
            }

            html += `
                <div class="mt-6 border-t pt-6">
                    <h4 class="font-bold text-gray-800 mb-2">數位解方建議：</h4>
                    <ul class="list-disc list-inside text-sm text-gray-600 space-y-1">
                        <li>試著將手機螢幕設定為「灰階」，降低視覺誘惑。</li>
                        <li>每天設定 30 分鐘的「無手機留白時間」。</li>
                        <li>練習察覺：在拿起手機前，先問自己「我現在是什麼心情？」。</li>
                    </ul>
                </div>
            `;
            
            document.getElementById('analysis-output').innerHTML = html;
        }

        function showStep(oldId, newId) {
            document.getElementById(oldId).classList.add('step-hidden');
            document.getElementById(newId).classList.remove('step-hidden');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
